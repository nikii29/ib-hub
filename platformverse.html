<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlatformVerse</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  canvas {
    display: block;
    border: 2px solid #1a3a5c;
    border-radius: 4px;
    max-width: 100vw;
    max-height: 100vh;
  }
  #controls {
    margin-top: 8px;
    color: #4a6fa5;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    text-align: center;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">Flechas / WASD para moverse | ESPACIO / W / Arriba para saltar | Salta sobre los enemigos para eliminarlos</div>

<script>
// =====================================================
//  PLATFORMVERSE - Juego de plataformas 2D
// =====================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = 900;
canvas.height = 520;

// ── Constantes físicas ─────────────────────────────
const GRAVITY    = 0.68;
const GROUND_Y   = canvas.height - 60;
const LEVEL_W    = 3200;

// ── Estado global ──────────────────────────────────
let STATE      = 'menu';   // menu | char_select | world_select | game | gameover | win
let selChar    = 0;
let selWorld   = 0;
let score      = 0;
let lives      = 3;
let coinCount  = 0;
let scrollX    = 0;
let frameCount = 0;

// ── Input ──────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (!keys[e.code]) onKeyDown(e.code);
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('click', onClick);

// ─────────────────────────────────────────────────────────────
//  PERSONAJES
// ─────────────────────────────────────────────────────────────
const CHARS = [
  {
    name: 'HÉROE',
    desc: 'Balanceado',
    tag: 'VEL ████  SALT ████',
    speed: 5.0, jump: 12,
    draw(x, y, dir, anim) {
      // Zapatos
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x + (dir>0 ? -12 : 2), y - 6, 11, 8);
      ctx.fillRect(x + (dir>0 ?   0 :-13), y - 6, 11, 8);
      // Pantalón
      ctx.fillStyle = '#2471a3';
      ctx.fillRect(x - 10, y - 20, 20, 16);
      // Cuerpo (overol rojo)
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(x - 11, y - 38, 22, 20);
      // Tirantes
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(x - 4, y - 38, 4, 18);
      ctx.fillRect(x + 1, y - 38, 4, 18);
      // Cabeza
      ctx.fillStyle = '#f5cba7';
      ctx.fillRect(x - 9, y - 54, 18, 18);
      // Gorra
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(x - 9, y - 60, 18, 8);
      ctx.fillRect(x + (dir>0 ? 4 :-16), y - 56, 12, 4);
      // Ojo
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x + (dir>0 ? 2 : -8), y - 48, 4, 4);
      // Bigote
      ctx.fillStyle = '#6d3b1e';
      ctx.fillRect(x + (dir>0 ? -2 : -6), y - 42, 8, 3);
    }
  },
  {
    name: 'NINJA',
    desc: 'Super rapido',
    tag: 'VEL ██████  SALT ███',
    speed: 7.5, jump: 10,
    draw(x, y, dir, anim) {
      // Piernas
      ctx.fillStyle = '#1a252f';
      ctx.fillRect(x - 10, y - 20, 8, 22);
      ctx.fillRect(x + 2,  y - 20, 8, 22);
      // Cuerpo
      ctx.fillStyle = '#2c3e50';
      ctx.fillRect(x - 11, y - 38, 22, 20);
      // Faja roja
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(x - 11, y - 24, 22, 5);
      // Cabeza (con máscara)
      ctx.fillStyle = '#2c3e50';
      ctx.fillRect(x - 9, y - 54, 18, 18);
      // Ranura de ojos
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(x - 7, y - 46, 14, 5);
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + (dir>0 ? -4 : -4), y - 46, 4, 5);
      // Kunai
      ctx.strokeStyle = '#95a5a6';
      ctx.lineWidth = 2;
      ctx.beginPath();
      const kx = x + (dir>0 ? 14 : -14);
      ctx.moveTo(kx, y - 36);
      ctx.lineTo(kx + (dir>0 ? 8 : -8), y - 28);
      ctx.stroke();
    }
  },
  {
    name: 'ASTRONAUTA',
    desc: 'Salta muy alto',
    tag: 'VEL ███  SALT ███████',
    speed: 4.0, jump: 14,
    draw(x, y, dir, anim) {
      // Botas
      ctx.fillStyle = '#95a5a6';
      ctx.fillRect(x - 12, y - 8, 11, 10);
      ctx.fillRect(x + 1,  y - 8, 11, 10);
      // Traje (cuerpo)
      ctx.fillStyle = '#ecf0f1';
      ctx.fillRect(x - 13, y - 38, 26, 32);
      // Mochila propulsora
      ctx.fillStyle = '#bdc3c7';
      ctx.fillRect(x + (dir>0 ? -17 : 9), y - 36, 10, 20);
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(x + (dir>0 ? -15 : 11), y - 28, 6, 6);
      // Casco
      ctx.fillStyle = '#bdc3c7';
      ctx.beginPath();
      ctx.arc(x, y - 50, 16, 0, Math.PI * 2);
      ctx.fill();
      // Visor
      ctx.fillStyle = '#3498db';
      ctx.beginPath();
      ctx.arc(x, y - 50, 11, 0, Math.PI * 2);
      ctx.fill();
      // Reflejo visor
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(x - 4, y - 55, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  },
  {
    name: 'MAGO',
    desc: 'Vuelo y magia',
    tag: 'VEL ████  SALT █████',
    speed: 4.5, jump: 13,
    draw(x, y, dir, anim) {
      // Ropa
      ctx.fillStyle = '#8e44ad';
      ctx.fillRect(x - 12, y - 38, 24, 40);
      // Capa
      ctx.fillStyle = '#6c3483';
      ctx.fillRect(x + (dir>0 ? -16 : 4), y - 36, 12, 30);
      // Detalles dorados
      ctx.fillStyle = '#f1c40f';
      ctx.fillRect(x - 3, y - 38, 6, 3);
      // Cabeza
      ctx.fillStyle = '#f5cba7';
      ctx.fillRect(x - 8, y - 54, 16, 18);
      // Sombrero
      ctx.fillStyle = '#6c3483';
      ctx.fillRect(x - 10, y - 60, 20, 8);
      ctx.beginPath();
      ctx.moveTo(x - 6, y - 60);
      ctx.lineTo(x + 6, y - 60);
      ctx.lineTo(x, y - 82);
      ctx.closePath();
      ctx.fill();
      // Estrella en el sombrero
      ctx.fillStyle = '#f1c40f';
      ctx.font = 'bold 10px serif';
      ctx.textAlign = 'center';
      ctx.fillText('*', x, y - 68);
      // Ojo
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x + (dir>0 ? 1 : -8), y - 46, 4, 4);
      // Barba
      ctx.fillStyle = '#d5d8dc';
      ctx.fillRect(x - 6, y - 40, 12, 6);
      // Bastón
      ctx.strokeStyle = '#6d4c41';
      ctx.lineWidth = 3;
      ctx.beginPath();
      const sx = x + (dir>0 ? 15 : -15);
      ctx.moveTo(sx, y - 5);
      ctx.lineTo(sx + (dir>0 ? 5 : -5), y - 48);
      ctx.stroke();
      // Orbe mágico
      const glow = ctx.createRadialGradient(sx + (dir>0?6:-6), y-50, 1, sx + (dir>0?6:-6), y-50, 8);
      glow.addColorStop(0, '#f1c40f');
      glow.addColorStop(1, 'rgba(241,196,15,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(sx + (dir>0?6:-6), y-50, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#f1c40f';
      ctx.beginPath();
      ctx.arc(sx + (dir>0?6:-6), y-50, 5, 0, Math.PI*2);
      ctx.fill();
    }
  }
];

// ─────────────────────────────────────────────────────────────
//  MUNDOS
// ─────────────────────────────────────────────────────────────
const WORLDS = [
  {
    name: 'COLINAS VERDES',
    desc: 'El mundo clasico',
    sky0: '#5dade2', sky1: '#aed6f1',
    ground: '#196f3d', groundTop: '#27ae60',
    platColor: '#1d8348', platTop: '#2ecc71',
    enemyColor: '#922b21', enemyEye: '#f9ebea',
    enemyType: 0,
    drawBg(w, h, sc) {
      // Montañas lejanas (parallax)
      ctx.fillStyle = '#a9cce3';
      [[100,160],[280,130],[460,150],[640,140],[820,160]].forEach(([mx,mh]) => {
        const rx = mx - sc * 0.15;
        ctx.beginPath();
        ctx.moveTo(rx - 90, h - 60);
        ctx.lineTo(rx,      h - 60 - mh);
        ctx.lineTo(rx + 90, h - 60);
        ctx.closePath();
        ctx.fill();
      });
      // Nubes (parallax medio)
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      [[80,60],[300,45],[560,70],[780,55],[1020,65],[1250,50]].forEach(([cx,cy]) => {
        const rx = cx - sc * 0.3;
        drawCloud(rx, cy, 28);
      });
      // Flores decorativas sobre el suelo
      ctx.fillStyle = '#e74c3c';
      for(let fx = 80; fx < LEVEL_W; fx += 160) {
        const rx = fx - sc;
        if(rx < -20 || rx > w + 20) continue;
        ctx.fillRect(rx - 1, h - 66, 3, 8);
        ctx.beginPath();
        ctx.arc(rx, h - 68, 5, 0, Math.PI*2);
        ctx.fill();
      }
    }
  },
  {
    name: 'ESTACION ESPACIAL',
    desc: 'Gravedad cero',
    sky0: '#050520', sky1: '#0d1b4b',
    ground: '#37474f', groundTop: '#546e7a',
    platColor: '#263238', platTop: '#455a64',
    enemyColor: '#4a148c', enemyEye: '#ea80fc',
    enemyType: 1,
    drawBg(w, h, sc) {
      // Estrellas (fijas, no scroll)
      ctx.fillStyle = '#ffffff';
      const stars = [[45,30],[120,80],[200,20],[310,65],[420,35],[540,90],[670,25],[780,55],[860,75],[140,130],[380,110],[620,140],[90,200],[450,180],[750,195],[250,240],[580,220],[850,260]];
      stars.forEach(([sx,sy]) => {
        ctx.beginPath();
        ctx.arc(sx, sy, 1.2, 0, Math.PI*2);
        ctx.fill();
      });
      // Planeta lejano
      const px = 750 - sc * 0.05;
      ctx.fillStyle = '#7986cb';
      ctx.beginPath();
      ctx.arc(px, 100, 55, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#5c6bc0';
      ctx.beginPath();
      ctx.arc(px, 100, 55, 0.3, 1.1);
      ctx.fill();
      // Anillo del planeta
      ctx.strokeStyle = '#9fa8da';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(px, 100, 80, 18, -0.2, 0, Math.PI*2);
      ctx.stroke();
      // Nebulosa
      const ng = ctx.createRadialGradient(200,120,10,200,120,100);
      ng.addColorStop(0, 'rgba(100,0,200,0.15)');
      ng.addColorStop(1, 'rgba(100,0,200,0)');
      ctx.fillStyle = ng;
      ctx.fillRect(0, 0, w, h);
    }
  },
  {
    name: 'OCEANO PROFUNDO',
    desc: 'Bajo las olas',
    sky0: '#0d47a1', sky1: '#1565c0',
    ground: '#0d2e4d', groundTop: '#1565c0',
    platColor: '#1565c0', platTop: '#1976d2',
    enemyColor: '#00695c', enemyEye: '#e0f2f1',
    enemyType: 2,
    drawBg(w, h, sc) {
      // Rayos de luz subacuáticos
      ctx.save();
      for(let i = 0; i < 5; i++) {
        const rx = (100 + i * 180) - sc * 0.1;
        const ray = ctx.createLinearGradient(rx, 0, rx + 30, h);
        ray.addColorStop(0, 'rgba(100,180,255,0.12)');
        ray.addColorStop(1, 'rgba(100,180,255,0)');
        ctx.fillStyle = ray;
        ctx.beginPath();
        ctx.moveTo(rx, 0);
        ctx.lineTo(rx + 40, 0);
        ctx.lineTo(rx + 80, h);
        ctx.lineTo(rx - 20, h);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
      // Burbujas
      ctx.strokeStyle = 'rgba(150,220,255,0.5)';
      ctx.lineWidth = 1.5;
      [[60,80],[180,150],[330,60],[500,120],[680,90],[820,140]].forEach(([bx,by]) => {
        const rx = bx - sc * 0.2;
        ctx.beginPath(); ctx.arc(rx, by + Math.sin(frameCount*0.02+bx)*5, 7, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(rx+25, by+50 + Math.sin(frameCount*0.02+bx+1)*4, 4, 0, Math.PI*2); ctx.stroke();
      });
      // Algas
      ctx.strokeStyle = '#1b5e20';
      ctx.lineWidth = 5;
      [[80],[220],[460],[640],[900],[1100]].forEach(([ax]) => {
        const rx = ax - sc;
        if(rx < -20 || rx > w+20) return;
        ctx.beginPath();
        ctx.moveTo(rx, h-60);
        ctx.bezierCurveTo(rx-20, h-100, rx+20, h-140, rx, h-160);
        ctx.stroke();
      });
    }
  },
  {
    name: 'MUNDO VOLCANICO',
    desc: 'Fuego y lava',
    sky0: '#4a0000', sky1: '#b71c1c',
    ground: '#3e2723', groundTop: '#b71c1c',
    platColor: '#4e342e', platTop: '#c62828',
    enemyColor: '#e65100', enemyEye: '#fff3e0',
    enemyType: 3,
    drawBg(w, h, sc) {
      // Volcanes de fondo
      ctx.fillStyle = '#6d1a1a';
      [[120,200],[680,170]].forEach(([vx,vh]) => {
        const rx = vx - sc * 0.2;
        ctx.beginPath();
        ctx.moveTo(rx - 100, h - 60);
        ctx.lineTo(rx,       h - 60 - vh);
        ctx.lineTo(rx + 100, h - 60);
        ctx.closePath();
        ctx.fill();
        // Lava en la cima
        ctx.fillStyle = '#e53935';
        ctx.beginPath();
        ctx.arc(rx, h - 60 - vh + 5, 18, Math.PI, 0);
        ctx.fill();
      });
      // Partículas de ceniza
      ctx.fillStyle = 'rgba(80,40,30,0.6)';
      for(let i = 0; i < 12; i++) {
        const ax = (50 + i * 70 + (frameCount * (1+i*0.1)) % 900) % 900;
        const ay = (30 + i * 40 + frameCount * 0.5) % (h - 80);
        ctx.fillRect(ax, ay, 3, 3);
      }
      // Brillo de lava en el suelo
      const lavag = ctx.createLinearGradient(0, h-80, 0, h-60);
      lavag.addColorStop(0, 'rgba(255,80,0,0.3)');
      lavag.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = lavag;
      ctx.fillRect(0, h-80, w, 20);
    }
  }
];

function drawCloud(x, y, r) {
  ctx.beginPath();
  ctx.arc(x,     y,     r*0.9, 0, Math.PI*2);
  ctx.arc(x+r,   y-r*0.2, r*1.1, 0, Math.PI*2);
  ctx.arc(x+r*2, y,     r*0.8, 0, Math.PI*2);
  ctx.fill();
}

// ─────────────────────────────────────────────────────────────
//  ENTIDADES DEL JUEGO
// ─────────────────────────────────────────────────────────────
let player, platforms, enemies, coins, particles;

function initGame() {
  scrollX   = 0;
  score     = 0;
  lives     = 3;
  coinCount = 0;

  const ch = CHARS[selChar];

  player = {
    x: 100, y: GROUND_Y,
    vx: 0,  vy: 0,
    w: 22,  h: 56,
    speed: ch.speed,
    jumpForce: ch.jump,
    onGround: false,
    dir: 1,
    invincible: 0,
    charIndex: selChar
  };

  // ── Plataformas ──────────────────────────────────
  platforms = [
    { x: 0, y: GROUND_Y, w: LEVEL_W, h: 60 }
  ];

  // Layout de plataformas en arcos ascendentes
  const layout = [
    // x,    y,   w
    [180,  400, 110],
    [340,  340,  90],
    [490,  390, 100],
    [640,  350,  80],
    [790,  360,  90],
    [960,  350, 100],
    [1120, 380,  90],
    [1280, 350,  80],
    [1450, 360, 100],
    [1600, 340,  90],
    [1760, 360,  80],
    [1920, 350, 100],
    [2080, 380,  90],
    [2240, 350,  80],
    [2400, 360, 100],
    [2560, 350,  90],
    [2720, 360,  80],
    [2880, 350, 100],
    [3020, 350,  90],
  ];
  layout.forEach(([px, py, pw]) => {
    platforms.push({ x: px, y: py, w: pw, h: 18 });
  });

  // ── Enemigos ─────────────────────────────────────
  enemies = [];
  const ePositions = [300,520,760,1000,1200,1460,1680,1900,2120,2380,2600,2820,3000];
  const w = WORLDS[selWorld];
  ePositions.forEach(ex => {
    enemies.push({
      x: ex, y: GROUND_Y,
      vx: (Math.random() < 0.5 ? 1 : -1) * 1.5,
      vy: 0,
      alive: true,
      color: w.enemyColor,
      eyeColor: w.enemyEye,
      type: w.enemyType,
      dir: 1,
      anim: 0
    });
  });

  // ── Monedas ───────────────────────────────────────
  coins = [];
  for(let cx = 150; cx < LEVEL_W - 200; cx += 130) {
    coins.push({
      x: cx + (Math.random() * 60 - 30),
      y: GROUND_Y - 70 - Math.random() * 120,
      collected: false,
      phase: Math.random() * Math.PI * 2
    });
  }

  particles = [];
}

// ─────────────────────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────────────────────
function updateGame() {
  updatePlayer();
  updateEnemies();
  updateCoins();
  updateParticles();
}

function updatePlayer() {
  if (!player) return;

  const left  = keys['ArrowLeft']  || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];
  const jump  = keys['ArrowUp']    || keys['KeyW'] || keys['Space'];

  if (left)       { player.vx = -player.speed; player.dir = -1; }
  else if (right) { player.vx =  player.speed; player.dir =  1; }
  else            { player.vx *= 0.65; }

  if (jump && player.onGround) {
    player.vy = -player.jumpForce;
    player.onGround = false;
  }

  player.vy += GRAVITY;
  player.x  += player.vx;
  player.y  += player.vy;

  player.onGround = false;
  platforms.forEach(p => {
    if (collidesPlatformTop(player, p)) {
      player.y  = p.y;
      player.vy = 0;
      player.onGround = true;
    }
  });

  // Límites horizontales
  if (player.x < 14) { player.x = 14; player.vx = 0; }
  if (player.x > LEVEL_W - 14) { player.x = LEVEL_W - 14; player.vx = 0; }

  // Caída al vacío
  if (player.y > canvas.height + 80) {
    loseLife();
    return;
  }

  // Llegó a la meta
  if (player.x > LEVEL_W - 120) {
    STATE = 'win';
    return;
  }

  // Cámara
  const target = player.x - canvas.width * 0.35;
  scrollX = Math.max(0, Math.min(LEVEL_W - canvas.width, target));

  // Invencibilidad
  if (player.invincible > 0) player.invincible--;
}

function collidesPlatformTop(ent, p) {
  const ex = ent.x, ey = ent.y, evx = ent.vx ?? 0, evy = ent.vy ?? 0;
  const halfW = (ent.w || 22) / 2;
  return (
    ex + halfW > p.x &&
    ex - halfW < p.x + p.w &&
    ey > p.y &&
    ey - evy <= p.y + 2
  );
}

function loseLife() {
  lives--;
  if (lives <= 0) { STATE = 'gameover'; return; }
  player.x = 100;
  player.y = GROUND_Y - 60;
  player.vx = 0;
  player.vy = 0;
  player.invincible = 90;
  scrollX = 0;
}

function updateEnemies() {
  enemies.forEach(e => {
    if (!e.alive) return;

    e.x += e.vx;
    e.vy += GRAVITY;
    e.y += e.vy;
    e.anim = (e.anim + 0.15) % (Math.PI * 2);

    // Colisión con plataformas
    platforms.forEach(p => {
      if (collidesPlatformTop(e, p)) {
        e.y = p.y;
        e.vy = 0;
      }
    });

    // Rebote en límites
    if (e.x < 30)           { e.x = 30;           e.vx = Math.abs(e.vx); }
    if (e.x > LEVEL_W - 30) { e.x = LEVEL_W - 30; e.vx = -Math.abs(e.vx); }
    e.dir = e.vx > 0 ? 1 : -1;

    // Colisión con el jugador
    if (!player || player.invincible > 0) return;
    const dx = Math.abs(player.x - e.x);
    const dy = player.y - e.y;

    if (dx < 28 && Math.abs(dy) < 50) {
      // Stomped: jugador cae sobre el enemigo
      if (player.vy > 1 && dy > -10 && dy < 30) {
        e.alive = false;
        player.vy = -9;
        score += 100;
        spawnParticles(e.x, e.y - 15, e.color, 10);
      } else {
        // Golpe del enemigo
        lives--;
        player.invincible = 100;
        player.vy = -8;
        spawnParticles(player.x, player.y - 20, '#e74c3c', 8);
        if (lives <= 0) STATE = 'gameover';
      }
    }
  });
}

function updateCoins() {
  if (!player) return;
  coins.forEach(c => {
    if (c.collected) return;
    c.phase += 0.08;
    const dx = Math.abs(player.x - c.x);
    const dy = Math.abs((player.y - 28) - c.y);
    if (dx < 22 && dy < 22) {
      c.collected = true;
      coinCount++;
      score += 50;
      spawnParticles(c.x, c.y, '#f1c40f', 6);
    }
  });
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 / n) * i + Math.random() * 0.5;
    const v = 2 + Math.random() * 3;
    particles.push({
      x, y, color,
      vx: Math.cos(a) * v,
      vy: Math.sin(a) * v - 1,
      life: 35 + Math.random() * 15
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawGame() {
  const w = WORLDS[selWorld];

  // Fondo degradado
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, w.sky0);
  grad.addColorStop(1, w.sky1);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Elementos de fondo (parallax)
  ctx.save();
  ctx.translate(-scrollX * 0.0, 0); // fondo fijo para estrellas, etc.
  w.drawBg(canvas.width, canvas.height, scrollX);
  ctx.restore();

  // Plataformas
  platforms.forEach(p => {
    const sx = p.x - scrollX;
    if (sx + p.w < -10 || sx > canvas.width + 10) return;
    if (p.h === 60) {
      ctx.fillStyle = w.ground;
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.fillStyle = w.groundTop;
      ctx.fillRect(sx, p.y, p.w, 10);
      // Textura del suelo
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      for (let tx = Math.max(0, sx); tx < sx + p.w && tx < canvas.width; tx += 40) {
        ctx.fillRect(tx, p.y + 12, 2, 8);
      }
    } else {
      ctx.fillStyle = w.platColor;
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.fillStyle = w.platTop;
      ctx.fillRect(sx, p.y, p.w, 5);
      // Tornillos en las esquinas
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(sx + 3, p.y + 3, 4, 4);
      ctx.fillRect(sx + p.w - 7, p.y + 3, 4, 4);
    }
  });

  // Bandera de meta
  drawGoalFlag();

  // Monedas
  coins.forEach(c => {
    if (c.collected) return;
    const sx = c.x - scrollX;
    if (sx < -20 || sx > canvas.width + 20) return;
    const bob = Math.sin(c.phase) * 4;
    const scaleX = Math.abs(Math.cos(c.phase * 0.5)) * 0.8 + 0.2;
    ctx.save();
    ctx.translate(sx, c.y + bob);
    ctx.scale(scaleX, 1);
    // Sombra
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 10, 7, 3, 0, 0, Math.PI*2); ctx.fill();
    // Moneda
    const cg = ctx.createRadialGradient(-3, -3, 1, 0, 0, 9);
    cg.addColorStop(0, '#ffe066');
    cg.addColorStop(1, '#e67e22');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f39c12';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('$', 0, 3);
    ctx.restore();
  });

  // Enemigos
  enemies.forEach(e => {
    if (!e.alive) return;
    const sx = e.x - scrollX;
    if (sx < -60 || sx > canvas.width + 60) return;
    drawEnemy(sx, e.y, e.color, e.eyeColor, e.dir, e.anim, e.type);
  });

  // Partículas
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life / 40);
    ctx.fillStyle = p.color;
    const sx = p.x - scrollX;
    ctx.fillRect(sx - 4, p.y - 4, 8, 8);
  });
  ctx.globalAlpha = 1;

  // Jugador
  if (player) {
    if (player.invincible === 0 || Math.floor(player.invincible / 5) % 2 === 0) {
      CHARS[player.charIndex].draw(
        player.x - scrollX,
        player.y,
        player.dir,
        frameCount
      );
    }
    // Sombra del jugador
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(player.x - scrollX, player.y + 2, 11, 4, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // HUD
  drawHUD();
}

function drawEnemy(x, y, color, eyeColor, dir, anim, type) {
  switch(type) {
    case 0: { // Goomba clásico
      const legOff = Math.sin(anim) * 4;
      // Pies
      ctx.fillStyle = '#3e1a00';
      ctx.fillRect(x - 12, y - 5 + (dir>0 ? legOff : 0), 10, 7);
      ctx.fillRect(x + 2,  y - 5 + (dir>0 ? 0 : legOff), 10, 7);
      // Cuerpo
      ctx.fillStyle = color;
      ctx.fillRect(x - 13, y - 26, 26, 23);
      // Cabeza más oscura
      ctx.fillStyle = shadeColor(color, -20);
      ctx.fillRect(x - 11, y - 38, 22, 14);
      // Ojos
      ctx.fillStyle = eyeColor;
      ctx.fillRect(x - 8, y - 35, 7, 8);
      ctx.fillRect(x + 1,  y - 35, 7, 8);
      ctx.fillStyle = '#111';
      ctx.fillRect(x - 6, y - 33, 4, 5);
      ctx.fillRect(x + 3,  y - 33, 4, 5);
      // Cejas enojadas
      ctx.fillStyle = '#111';
      ctx.save();
      ctx.translate(x, y - 37);
      ctx.rotate(-0.3);
      ctx.fillRect(-8, 0, 7, 3);
      ctx.restore();
      ctx.save();
      ctx.translate(x, y - 37);
      ctx.rotate(0.3);
      ctx.fillRect(1, 0, 7, 3);
      ctx.restore();
      break;
    }
    case 1: { // Robot
      const blink = Math.floor(anim / 2) % 8 === 0;
      ctx.fillStyle = '#37474f';
      ctx.fillRect(x - 9, y - 8, 8, 10);
      ctx.fillRect(x + 1, y - 8, 8, 10);
      ctx.fillStyle = color;
      ctx.fillRect(x - 12, y - 32, 24, 26);
      ctx.fillStyle = '#263238';
      ctx.fillRect(x - 10, y - 42, 20, 14);
      ctx.fillStyle = blink ? '#ff1744' : eyeColor;
      ctx.fillRect(x - 7, y - 38, 6, 5);
      ctx.fillRect(x + 1,  y - 38, 6, 5);
      ctx.fillStyle = '#37474f';
      ctx.fillRect(x - 6, y - 22, 12, 3); // boca
      // Antena
      ctx.strokeStyle = '#90a4ae';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, y - 42);
      ctx.lineTo(x + (dir>0 ? 5 : -5), y - 52);
      ctx.stroke();
      ctx.fillStyle = '#ef5350';
      ctx.beginPath(); ctx.arc(x + (dir>0?5:-5), y-52, 4, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 2: { // Pez
      const swimY = Math.sin(anim * 0.8) * 6;
      ctx.save();
      ctx.translate(x, y - 18 + swimY);
      // Cola
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(dir>0 ? -14 : 14, 0);
      ctx.lineTo(dir>0 ? -24 : 24, -10);
      ctx.lineTo(dir>0 ? -24 : 24,  10);
      ctx.closePath();
      ctx.fill();
      // Cuerpo
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, 0, 16, 11, 0, 0, Math.PI*2);
      ctx.fill();
      // Vientre
      ctx.fillStyle = shadeColor(color, 40);
      ctx.beginPath();
      ctx.ellipse(dir>0 ? 3 : -3, 2, 9, 6, 0, 0, Math.PI*2);
      ctx.fill();
      // Ojo
      ctx.fillStyle = eyeColor;
      ctx.beginPath(); ctx.arc(dir>0 ? 7 : -7, -3, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(dir>0 ? 8 : -8, -3, 2.5, 0, Math.PI*2); ctx.fill();
      // Aleta
      ctx.fillStyle = shadeColor(color, -20);
      ctx.beginPath();
      ctx.moveTo(0, -10);
      ctx.lineTo(dir>0 ? -5 : 5, -18);
      ctx.lineTo(dir>0 ?  6 :-6, -10);
      ctx.closePath(); ctx.fill();
      ctx.restore();
      break;
    }
    case 3: { // Tortuga de fuego
      const legOff = Math.sin(anim) * 3;
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(x - 11, y - 6 + (dir>0?legOff:0), 9, 8);
      ctx.fillRect(x + 2,  y - 6 + (dir>0?0:legOff), 9, 8);
      // Caparazón
      const sg = ctx.createRadialGradient(x, y-22, 2, x, y-22, 16);
      sg.addColorStop(0, shadeColor(color, 20));
      sg.addColorStop(1, color);
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.ellipse(x, y - 22, 16, 14, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = shadeColor(color, -30);
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, y-36); ctx.lineTo(x, y-8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-14, y-22); ctx.lineTo(x+14, y-22); ctx.stroke();
      // Cabeza
      ctx.fillStyle = '#a5d6a7';
      ctx.fillRect(x + (dir>0 ? 10 : -18), y - 34, 12, 10);
      ctx.fillStyle = eyeColor;
      ctx.fillRect(x + (dir>0 ? 13 : -15), y - 32, 4, 4);
      ctx.fillStyle = '#111';
      ctx.fillRect(x + (dir>0 ? 14 : -14), y - 31, 2, 2);
      // Llamas
      ctx.fillStyle = 'rgba(255,100,0,0.7)';
      const ff = Math.sin(anim * 2) * 3;
      ctx.beginPath();
      ctx.arc(x + (dir>0 ? 20 : -20), y - 28 + ff, 5, 0, Math.PI*2);
      ctx.fill();
      break;
    }
  }
}

function shadeColor(hex, amount) {
  const r = Math.max(0, Math.min(255, parseInt(hex.slice(1,3),16) + amount));
  const g = Math.max(0, Math.min(255, parseInt(hex.slice(3,5),16) + amount));
  const b = Math.max(0, Math.min(255, parseInt(hex.slice(5,7),16) + amount));
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function drawGoalFlag() {
  const fx = LEVEL_W - 120 - scrollX;
  if (fx < -50 || fx > canvas.width + 50) return;
  // Poste
  ctx.strokeStyle = '#7f8c8d';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(fx, GROUND_Y);
  ctx.lineTo(fx, GROUND_Y - 220);
  ctx.stroke();
  // Bandera animada
  const wave = Math.sin(frameCount * 0.08) * 5;
  ctx.fillStyle = '#2ecc71';
  ctx.beginPath();
  ctx.moveTo(fx, GROUND_Y - 220);
  ctx.bezierCurveTo(fx+20+wave, GROUND_Y-210, fx+40+wave, GROUND_Y-200+wave, fx+50+wave, GROUND_Y-195);
  ctx.bezierCurveTo(fx+40+wave, GROUND_Y-190+wave, fx+20+wave, GROUND_Y-180, fx, GROUND_Y-170);
  ctx.closePath();
  ctx.fill();
  // Estrella en la cima
  ctx.fillStyle = '#f1c40f';
  ctx.font = 'bold 18px serif';
  ctx.textAlign = 'center';
  ctx.fillText('★', fx, GROUND_Y - 225);
}

  ctx.fillStyle = '#3498db';
  ctx.font = '12px "Courier New"';

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawWorldSelect() {
  ctx.fillStyle = '#0f1923';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';
  ctx.font = 'bold 38px "Courier New"';
  ctx.fillStyle = '#f1c40f';
  ctx.fillText('ELIGE TU MUNDO', canvas.width/2, 55);

  WORLDS.forEach((w, i) => {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const cx = 230 + col * 440;
    const cy = 185 + row * 215;
    const sel = i === selWorld;
    const pw = 340, ph = 155;

    // Marco exterior
    ctx.strokeStyle = sel ? '#f1c40f' : '#1e3a5a';
    ctx.lineWidth = sel ? 3 : 1;
    if (sel) {
      ctx.strokeStyle = 'rgba(241,196,15,0.3)';
      ctx.lineWidth = 10;
      roundRect(cx - pw/2 - 2, cy - ph/2 - 2, pw + 4, ph + 4, 10);
      ctx.stroke();
    }

    // Preview del mundo (recortado)
    ctx.save();
    roundRect(cx - pw/2, cy - ph/2, pw, ph, 8);
    ctx.clip();

    // Cielo
    const sg = ctx.createLinearGradient(cx-pw/2, cy-ph/2, cx-pw/2, cy+ph/2);
    sg.addColorStop(0, w.sky0);
    sg.addColorStop(1, w.sky1);

    ctx.fillRect(cx - pw/2, cy + ph/2 - 30, pw, 30);
    ctx.fillStyle = w.groundTop;
    ctx.fillRect(cx - pw/2, cy + ph/2 - 30, pw, 6);

    // Plataformas mini

    [[40,40],[130,65],[220,50],[290,35]].forEach(([px,py]) => {
      ctx.fillRect(cx - pw/2 + px, cy + ph/2 - 30 - py, 60, 8);

      ctx.fillRect(cx - pw/2 + px, cy + ph/2 - 30 - py, 60, 3);
      ctx.fillStyle = w.platColor;
    });

    // Mini enemigo

    ctx.fillRect(cx - pw/2 + 80, cy + ph/2 - 46, 14, 16);
    ctx.fillStyle = w.enemyEye;
    ctx.fillRect(cx - pw/2 + 82, cy + ph/2 - 44, 4, 4);
    ctx.fillRect(cx - pw/2 + 88, cy + ph/2 - 44, 4, 4);

    ctx.restore();

    // Borde final
    ctx.strokeStyle = sel ? '#f1c40f' : '#2c3e50';
    ctx.lineWidth = sel ? 3 : 1;
    roundRect(cx - pw/2, cy - ph/2, pw, ph, 8);
    ctx.stroke();

    // Nombre y descripción
    ctx.fillStyle = sel ? '#f1c40f' : '#ecf0f1';
    ctx.font = `bold ${sel ? 17 : 15}px "Courier New"`;
    ctx.fillText(w.name, cx, cy + ph/2 + 24);
    ctx.fillStyle = '#7f8c8d';
    ctx.font = '13px "Courier New"';
    ctx.fillText(w.desc, cx, cy + ph/2 + 40);
  });

  ctx.fillStyle = '#4a6fa5';
  ctx.font = '16px "Courier New"';
  ctx.fillText('← → ↑ ↓ para elegir   |   ENTER para empezar', canvas.width/2, 492);
}

function drawGameOver() {
  // Fondo oscuro semitransparente
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';

  // Texto con sombra
  ctx.font = 'bold 72px "Courier New"';
  ctx.fillStyle = '#7f1d1d';
  ctx.fillText('GAME OVER', canvas.width/2 + 4, 210 + 4);
  ctx.fillStyle = '#e74c3c';
  ctx.fillText('GAME OVER', canvas.width/2, 210);

  ctx.fillStyle = '#ecf0f1';
  ctx.font = '24px "Courier New"';
  ctx.fillText('PUNTUACION FINAL:  ' + score, canvas.width/2, 280);
  ctx.fillText('MONEDAS:  ' + coinCount, canvas.width/2, 316);

  const stars = score > 2000 ? 3 : score > 1000 ? 2 : 1;
  ctx.font = '36px sans-serif';
  ctx.fillText('★'.repeat(stars) + '☆'.repeat(3-stars), canvas.width/2, 370);

  if (Math.floor(frameCount/30) % 2 === 0) {
    ctx.fillStyle = '#2ecc71';
    ctx.font = 'bold 22px "Courier New"';
    ctx.fillText('[ ENTER ] Volver al menu', canvas.width/2, 440);
  }
}

function drawWin() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';

  ctx.font = 'bold 70px "Courier New"';
  ctx.fillStyle = '#0a4a0a';
  ctx.fillText('!GANASTE!', canvas.width/2 + 4, 190 + 4);
  const wg = ctx.createLinearGradient(0, 130, 0, 200);
  wg.addColorStop(0, '#f1c40f');
  wg.addColorStop(1, '#2ecc71');
  ctx.fillStyle = wg;
  ctx.fillText('!GANASTE!', canvas.width/2, 190);

  ctx.fillStyle = '#ecf0f1';
  ctx.font = '22px "Courier New"';
  ctx.fillText('PUNTUACION FINAL:  ' + score, canvas.width/2, 265);
  ctx.fillText('MONEDAS:  ' + coinCount, canvas.width/2, 298);
  ctx.fillText('PERSONAJE:  ' + CHARS[selChar].name, canvas.width/2, 331);
  ctx.fillText('MUNDO:  ' + WORLDS[selWorld].name, canvas.width/2, 364);

  const stars = score > 2500 ? 3 : score > 1500 ? 2 : 1;
  ctx.font = '38px sans-serif';
  ctx.fillText('★'.repeat(stars) + '☆'.repeat(3-stars), canvas.width/2, 420);

  if (Math.floor(frameCount/30) % 2 === 0) {
    ctx.fillStyle = '#f1c40f';
    ctx.font = 'bold 22px "Courier New"';
    ctx.fillText('[ ENTER ] Volver al menu', canvas.width/2, 480);
  }
}

// ─────────────────────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────────────────────
function onKeyDown(code) {
  if (STATE === 'menu') {
    if (code === 'Enter' || code === 'Space') STATE = 'char_select';
  }
  else if (STATE === 'char_select') {
    if (code === 'ArrowLeft')  selChar = (selChar - 1 + CHARS.length) % CHARS.length;
    if (code === 'ArrowRight') selChar = (selChar + 1) % CHARS.length;
    if (code === 'Enter')      STATE = 'world_select';
  }
  else if (STATE === 'world_select') {
    if (code === 'ArrowLeft')  selWorld = (selWorld - 1 + WORLDS.length) % WORLDS.length;
    if (code === 'ArrowRight') selWorld = (selWorld + 1) % WORLDS.length;
    if (code === 'ArrowUp')    selWorld = (selWorld - 2 + WORLDS.length) % WORLDS.length;
    if (code === 'ArrowDown')  selWorld = (selWorld + 2) % WORLDS.length;
    if (code === 'Enter')      { initGame(); STATE = 'game'; }
  }
  else if (STATE === 'gameover' || STATE === 'win') {
    if (code === 'Enter') STATE = 'menu';
  }
}

function onClick(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width  / rect.width);
  const my = (e.clientY - rect.top)  * (canvas.height / rect.height);

  if (STATE === 'menu') {
    STATE = 'char_select';
    return;
  }
  if (STATE === 'char_select') {
    for (let i = 0; i < CHARS.length; i++) {
      const cx = 105 + i * 175;
      if (mx > cx - 75 && mx < cx + 75 && my > 110 && my < 360) {
        if (selChar === i) { STATE = 'world_select'; return; }
        selChar = i;
        return;
      }
    }
    return;
  }
  if (STATE === 'world_select') {
    for (let i = 0; i < WORLDS.length; i++) {
      const col = i % 2, row = Math.floor(i/2);
      const cx = 230 + col*440, cy = 185 + row*215;
      if (mx > cx-170 && mx < cx+170 && my > cy-80 && my < cy+80) {
        if (selWorld === i) { initGame(); STATE = 'game'; return; }
        selWorld = i;
        return;
      }
    }
    return;
  }
  if (STATE === 'gameover' || STATE === 'win') {
    STATE = 'menu';
  }
}

// ─────────────────────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────────────────────
function loop() {
  frameCount++;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  switch(STATE) {
    case 'menu':         drawMenu();        break;
    case 'char_select':  drawCharSelect();  break;
    case 'world_select': drawWorldSelect(); break;
    case 'game':
      drawGame();
      updateGame();
      break;
    case 'gameover':
      drawGame();
      drawGameOver();
      break;
    case 'win':
      drawGame();
      drawWin();
      break;
  }

  requestAnimationFrame(loop);
}

loop();
</script>
